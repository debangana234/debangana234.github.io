<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.65;
      max-width: 850px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
      background: #fff;
    }

    h1, h2, h3 {
      line-height: 1.25;
      margin-top: 2rem;
    }

    h1 {
      margin-top: 0;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    code {
      background: #f6f8fa;
      padding: 2px 5px;
      border-radius: 4px;
    }

    pre {
      background: #f6f8fa;
      padding: 16px;
      overflow-x: auto;
      border-radius: 6px;
    }

    blockquote {
      border-left: 4px solid #ddd;
      margin-left: 0;
      padding-left: 1rem;
      color: #555;
    }

    nav {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #ddd;
    }

    nav a {
      margin-right: 1rem;
      text-decoration: none;
      color: #0366d6;
    }

    .post-meta {
      color: #666;
      font-size: 0.95rem;
    }

    .figure-caption {
      text-align: center;
      font-style: italic;
      color: #555;
      font-size: 0.95rem;
      margin-top: -0.5rem;
      margin-bottom: 2rem;
    }

    .math-display {
      text-align: center;
      overflow-x: auto;
      margin: 1.4rem 0;
    }
  </style>

  <!-- MathJax configuration.
       This blog uses \(...\) for inline math and \[...\] for display math. -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script async id="MathJax-script"
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js">
  </script>
</head>

<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/blog/' | relative_url }}">Blog</a>
  </nav>

  {{ content }}
</body>
</html>
